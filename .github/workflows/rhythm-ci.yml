name: rhythm-ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rhythm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Compile check
        run: python -m compileall -q modules tasks scripts tests utils data_gen
      - name: Rhythm unit tests
        run: python -m unittest discover -s tests/rhythm -p "test_*.py"
      - name: Rhythm smoke
        run: python -u scripts/smoke_test_rhythm_v2.py
