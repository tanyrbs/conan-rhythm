name: rhythm-ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rhythm:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Preflight CLI help
        run: python scripts/preflight_rhythm_v2.py --help
      - name: Compile check
        run: python -m compileall -q modules tasks scripts tests utils data_gen
      - name: Rhythm unit tests
        run: python -m unittest discover -s tests/rhythm -p "test_*.py"
      - name: Rhythm smoke
        run: python -u scripts/smoke_test_rhythm_v2.py
