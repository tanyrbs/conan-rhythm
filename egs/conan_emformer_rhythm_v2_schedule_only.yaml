base_config: egs/conan_emformer_rhythm_v2_minimal_v1.yaml

# Legacy student warm-start kept for compatibility / ablation.
# Maintained mainline is now:
#   teacher_offline -> student_kd -> student_retimed
rhythm_minimal_v1_profile: false
rhythm_stage: legacy_schedule_only
rhythm_strict_mainline: true
rhythm_schedule_only_stage: true
rhythm_teacher_only_stage: false
rhythm_teacher_as_main: false
rhythm_optimize_module_only: true
rhythm_optimize_pause_state: false
rhythm_fastpath_disable_acoustic_when_module_only: true
rhythm_compact_joint_loss: false

# This legacy warm-start remains useful for ablation / projector-only bootstraps,
# but it is no longer part of the maintained formal chain.
rhythm_streaming_prefix_train: true
rhythm_streaming_prefix_min_ratio: 0.45
rhythm_streaming_prefix_max_ratio: 0.75
rhythm_prefix_tail_open_units: 1
rhythm_strict_content_mel_contract: true
rhythm_content_mel_tolerance: 0
rhythm_enable_algorithmic_teacher: false
rhythm_enable_dual_mode_teacher: false
rhythm_enable_learned_offline_teacher: false
rhythm_runtime_enable_learned_offline_teacher: false
rhythm_teacher_target_source: learned_offline
rhythm_distill_surface: none
lambda_rhythm_budget: 0.05
lambda_rhythm_cumplan: 0.12
lambda_rhythm_plan: 0.0
lambda_rhythm_guidance: 0.0
lambda_rhythm_distill: 0.0
lambda_rhythm_teacher_aux: 0.0
rhythm_pause_exec_boundary_boost: 0.75
rhythm_pause_boundary_weight: 0.35
rhythm_feasible_debt_weight: 0.05
lambda_mel_adv: 0.0

# Warm-start the projector with a fixed learning rate; long warmup makes the tiny schedule losses move too slowly.
scheduler: none

# Stage-1 skips pitch/F0 extraction on the module-only fast path.
use_pitch_embed: false
binarization_args:
  with_f0: false
