base_config: egs/conan_emformer.yaml
mel_losses: "l1:1.0"

binarization_args:
  with_rhythm_cache: true

# Recommended maintained V1:
# Layer 0 = stable lattice interface:
# explicit silence runs + causal debounce + commit-safe closed/open run contract.
# Layer 1 = minimal source-anchored retimer:
# analytic global rate gap + one coarse scalar + speech-only local residual.
# Silence is a clipped coarse follower; execution uses carry rounding + prefix budget.
rhythm_enable_v2: false
rhythm_enable_v3: true
rhythm_minimal_style_only: true
rhythm_public_inputs: [content_units, dur_anchor_src, unit_anchor_base, source_silence_mask, source_boundary_cue, source_run_stability, prompt_content_units, prompt_duration_obs, prompt_unit_mask, prompt_speech_mask]
rhythm_public_outputs: [unit_duration_exec, speech_duration_exec, rhythm_frame_plan, commit_frontier, rhythm_state_next]
rhythm_public_losses: [rhythm_total, rhythm_v3_dur, rhythm_v3_bias, rhythm_v3_pref, rhythm_v3_cons]

content_vocab_size: 102
rhythm_hidden_size: 256
rhythm_anchor_hidden_size: 128
rhythm_anchor_min_frames: 1.0
rhythm_anchor_max_frames: 12.0
# Maintained baseline contract: frozen table prior + strict causal local trunk only.
# Slow structure, if used, lives outside baseline via progress/detector candidate layers.
# Optional scaffold: set rhythm_v3_baseline_train_mode=pretrain and lambda_rhythm_base>0
# to run baseline-only deglobalized pretraining before joint duration experiments.
rhythm_v3_baseline_train_mode: frozen
rhythm_v3_freeze_baseline: true
rhythm_v3_baseline_ckpt: null
rhythm_baseline_table_prior_path: null
rhythm_v3_baseline_target_mode: deglobalized
rhythm_v3_rate_mode: simple_global
rhythm_v3_use_log_base_rate: false
rhythm_v3_disable_learned_gate: true
# Maintained runtime default stays `learned`.
# For falsification, use checked-in overlays instead of hand-editing this file:
# - egs/overrides/rhythm_v3_gate0_g_audit.yaml
# - egs/overrides/rhythm_v3_gate1_analytic.yaml
# - egs/overrides/rhythm_v3_gate2_coarse_only.yaml
rhythm_v3_eval_mode: learned
rhythm_v3_g_variant: raw_median
rhythm_v3_g_trim_ratio: 0.2
rhythm_v3_drop_edge_runs_for_g: 1
rhythm_v3_min_boundary_confidence_for_g: 0.5
rhythm_v3_gate_quality_strict: true  # strict gate enforcement now baked into config validation
rhythm_v3_required_gate_status_json: egs/overrides/rhythm_v3_gate_status.json  # replace with scripts/rhythm_v3_debug_records.py output before training
# Only needed for g_variant=unit_norm. Build with scripts/build_unit_log_prior.py.
rhythm_v3_unit_prior_path: null
rhythm_v3_disable_local_residual: false
rhythm_v3_disable_coarse_bias: false
rhythm_v3_debug_export: true

rhythm_response_rank: 12
rhythm_response_window_left: 4
rhythm_response_window_right: 0
rhythm_progress_bins: 4
rhythm_streaming_mode: strict
rhythm_v3_minimal_v1_profile: true
rhythm_v3_strict_minimal_claim_profile: true
rhythm_v3_simple_global_stats: true
rhythm_v3_backbone: minimal_v1_global
rhythm_v3_warp_mode: none
rhythm_v3_allow_hybrid: false
rhythm_v3_source_residual_gain: 0.0
rhythm_v3_anchor_mode: source_observed
rhythm_summary_dim: 64
# legacy aliases still accepted:
# rhythm_role_dim: 64
# rhythm_num_role_slots: 1
rhythm_prompt_cov_floor: 0.05
rhythm_operator_ridge_lambda: 1.0
rhythm_global_shrink_tau: 0.0
rhythm_progress_support_tau: 8.0
rhythm_operator_support_tau: 8.0
rhythm_operator_holdout_ratio: 0.30
rhythm_operator_min_support_factor: 1.0

rhythm_force_reference_conditioning: true
rhythm_apply_mode: infer
rhythm_streaming_prefix_train: true
rhythm_streaming_prefix_deterministic: true
rhythm_streaming_prefix_min_ratio: 0.50
rhythm_streaming_prefix_max_ratio: 0.95
rhythm_streaming_prefix_min_tokens: 8
rhythm_streaming_prefix_multiple: 4
rhythm_tail_open_units: 2
rhythm_prefix_tail_open_units: 2
rhythm_v3_emit_silence_runs: true
rhythm_v3_prefix_budget_pos: 24
rhythm_v3_prefix_budget_neg: 24
rhythm_v3_dynamic_budget_ratio: 0.15
rhythm_v3_export_projector_telemetry: true
rhythm_v3_min_prefix_budget: 12
rhythm_v3_max_prefix_budget: 48
# Maintained default keeps projector budget support on full committed prefix mass.
# Use `speech_only` or `hybrid` only for explicit falsification/ablation runs.
rhythm_v3_budget_mode: total  # total | speech_only | hybrid
# Maintained minimal-V1 runs keep prompt augmentation off so the 3-8s
# reference-domain gate is evaluated on the real prompt span.
rhythm_prompt_dropout: 0.0
rhythm_prompt_truncation: 0.0
rhythm_v3_summary_pool_speech_only: true
rhythm_v3_debounce_min_run_frames: 2
rhythm_v3_local_cold_start_runs: 2
rhythm_v3_local_short_run_min_duration: 2.0
rhythm_max_logstretch: 1.2
rhythm_v3_local_rate_decay: 0.95
rhythm_v3_analytic_gap_clip: 0.35
rhythm_v3_use_src_gap_in_coarse_head: false
# The minimal-V1 contract keeps the local head detached from the shared global term
# and freezes the source-rate initialization; flip either flag only for explicit
# ablations or falsification experiments.
rhythm_v3_detach_global_term_in_local_head: true
rhythm_v3_freeze_src_rate_init: true
rhythm_v3_src_rate_init_mode: first_speech
rhythm_v3_src_rate_init_value: 0.0
# Minimal V1 keeps silence on a constant clip surface. Short-gap / leading-silence
# shaping remain non-minimal-only knobs and are intentionally omitted here.
rhythm_v3_boundary_offset_decay: 0.60
rhythm_v3_boundary_carry_decay: 0.25
rhythm_v3_boundary_reset_thresh: 0.55
rhythm_allow_eos_tail_flush_fallback: false
rhythm_v3_disallow_same_text_reference: true
rhythm_v3_disallow_same_text_paired_target: false
rhythm_v3_require_same_text_paired_target: true
pseudo_source_duration_perturbation: false
# Canonical paired training should not silently fall back to source-self
# duration targets. Only enable this for bootstrap/pretrain.
rhythm_v3_allow_source_self_target_fallback: false
rhythm_pseudo_source_global_scale_min: 0.85
rhythm_pseudo_source_global_scale_max: 1.15
rhythm_pseudo_source_local_span_prob: 0.20
rhythm_pseudo_source_local_scale_min: 0.70
rhythm_pseudo_source_local_scale_max: 1.30
rhythm_pseudo_source_mask_prob: 0.10
rhythm_pseudo_source_flatten_boundary_prob: 0.0
# Silence has no independent writer in V1; any auxiliary silence target must stay coarse-derived.
rhythm_v3_silence_coarse_weight: 0.0
rhythm_v3_silence_max_logstretch: 0.25

lambda_rhythm_dur: 1.0
lambda_rhythm_bias: 0.20  # maintained default; Gate 1 analytic falsification should override this to 0.0
lambda_rhythm_summary: 0.0
# canonical prompt SUMMARY auxiliary loss stays disabled unless experiments explicitly re-enable it
lambda_rhythm_pref: 0.0  # phase-0 falsification runs should not mix in prefix discipline
lambda_rhythm_base: 0.0
lambda_rhythm_cons: 0.0  # phase-0 falsification runs should first validate g before consistency regularization
lambda_rhythm_zero: 0.0
lambda_rhythm_ortho: 0.0

# Keep v3 target building strict by default: do not silently fall back to
# source run-length anchors as supervision.
# The maintained public recipe uses explicit continuous paired-target
# supervision and keeps its provenance explicit in config.
# The branch currently ships `continuous_precomputed` and
# `continuous_viterbi_v1`; `continuous_fwdbwd_v1` remains a planned upgrade
# surface and is not the maintained default.
rhythm_v3_strict_target_alignment: true
rhythm_v3_use_continuous_alignment: true
# Ignored unless rhythm_v3_use_continuous_alignment=true.
# continuous_viterbi_v1 is hard Viterbi occupancy only; posterior expected
# occupancy remains reserved for future continuous_fwdbwd_v1.
rhythm_v3_alignment_mode: continuous_viterbi_v1  # discrete | continuous_precomputed | continuous_viterbi_v1
rhythm_v3_alignment_lambda_emb: 1.0
rhythm_v3_alignment_lambda_type: 0.5
rhythm_v3_alignment_lambda_band: 0.2
rhythm_v3_alignment_lambda_unit: 0.0
rhythm_v3_alignment_band_ratio: 0.08
rhythm_v3_alignment_bad_cost_threshold: 1.2
rhythm_v3_alignment_min_dp_weight: 0.20
rhythm_v3_alignment_unmatched_speech_ratio_max: 0.15
rhythm_v3_alignment_mean_local_confidence_speech_min: 0.55
rhythm_v3_alignment_mean_coarse_confidence_speech_min: 0.60
rhythm_v3_alignment_local_margin_p10_min: 0.02
