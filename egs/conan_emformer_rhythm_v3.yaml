base_config: egs/conan_emformer.yaml
mel_losses: "l1:1.0"

binarization_args:
  with_rhythm_cache: true

# Recommended maintained mainline:
# explicit silence-run frontend + paired target projection + source-observed anchor
# + unit-run stretch writer (analytic rate gap + prefix coarse + local residual)
# + coarse-only silence control + prefix unit-budget clamp.
rhythm_enable_v2: false
rhythm_enable_v3: true
rhythm_minimal_style_only: true
rhythm_public_inputs: [content_units, dur_anchor_src, unit_anchor_base, prompt_content_units, prompt_duration_obs, prompt_unit_mask]
rhythm_public_outputs: [speech_duration_exec, rhythm_frame_plan, commit_frontier, rhythm_state_next]
rhythm_public_losses: [rhythm_total, rhythm_v3_dur, rhythm_v3_bias, rhythm_v3_pref, rhythm_v3_cons]

content_vocab_size: 102
rhythm_hidden_size: 256
rhythm_anchor_hidden_size: 128
rhythm_anchor_min_frames: 1.0
rhythm_anchor_max_frames: 12.0
# Maintained baseline contract: frozen table prior + strict causal local trunk only.
# Slow structure, if used, lives outside baseline via progress/detector candidate layers.
# Optional scaffold: set rhythm_v3_baseline_train_mode=pretrain and lambda_rhythm_base>0
# to run baseline-only deglobalized pretraining before joint duration experiments.
rhythm_v3_baseline_train_mode: joint
rhythm_v3_freeze_baseline: false
rhythm_v3_baseline_ckpt: null
rhythm_baseline_table_prior_path: null
rhythm_v3_baseline_target_mode: deglobalized

rhythm_response_rank: 12
rhythm_response_window_left: 4
rhythm_response_window_right: 0
rhythm_progress_bins: 4
rhythm_streaming_mode: strict
rhythm_v3_backbone: unit_run
rhythm_v3_warp_mode: none
rhythm_v3_allow_hybrid: false
rhythm_v3_source_residual_gain: 0.0
rhythm_v3_anchor_mode: source_observed
rhythm_summary_dim: 64
rhythm_num_summary_slots: 1
# legacy aliases still accepted:
# rhythm_role_dim: 64
# rhythm_num_role_slots: 1
rhythm_prompt_cov_floor: 0.05
rhythm_operator_ridge_lambda: 1.0
rhythm_global_shrink_tau: 8.0
rhythm_progress_support_tau: 8.0
rhythm_operator_support_tau: 8.0
rhythm_operator_holdout_ratio: 0.30
rhythm_operator_min_support_factor: 1.0

rhythm_force_reference_conditioning: true
rhythm_apply_mode: infer
rhythm_streaming_prefix_train: true
rhythm_streaming_prefix_deterministic: true
rhythm_streaming_prefix_min_ratio: 0.50
rhythm_streaming_prefix_max_ratio: 0.95
rhythm_streaming_prefix_min_tokens: 8
rhythm_streaming_prefix_multiple: 4
rhythm_v3_emit_silence_runs: true
rhythm_v3_prefix_budget_pos: 24
rhythm_v3_prefix_budget_neg: 24
rhythm_prompt_dropout: 0.20
rhythm_prompt_truncation: 0.50
rhythm_v3_summary_pool_speech_only: true
pseudo_source_duration_perturbation: false
# Canonical paired training should not silently fall back to source-self
# duration targets. Only enable this for bootstrap/pretrain.
rhythm_v3_allow_source_self_target_fallback: false
rhythm_pseudo_source_global_scale_min: 0.85
rhythm_pseudo_source_global_scale_max: 1.15
rhythm_pseudo_source_local_span_prob: 0.20
rhythm_pseudo_source_local_scale_min: 0.70
rhythm_pseudo_source_local_scale_max: 1.30
rhythm_pseudo_source_mask_prob: 0.10
rhythm_pseudo_source_flatten_boundary_prob: 0.0
rhythm_v3_silence_coarse_weight: 0.25
rhythm_v3_silence_max_logstretch: 0.25

lambda_rhythm_dur: 1.0
lambda_rhythm_bias: 0.20  # prefix-coarse supervision (compat metric still exports global_bias_scalar)
lambda_rhythm_summary: 0.0
# canonical prompt SUMMARY auxiliary loss stays disabled unless experiments explicitly re-enable it
lambda_rhythm_pref: 0.10
lambda_rhythm_base: 0.0
lambda_rhythm_cons: 0.10
lambda_rhythm_zero: 0.0
lambda_rhythm_ortho: 0.0

# Keep v3 target building strict by default: do not silently fall back to
# source run-length anchors as supervision.
rhythm_v3_strict_target_alignment: true
