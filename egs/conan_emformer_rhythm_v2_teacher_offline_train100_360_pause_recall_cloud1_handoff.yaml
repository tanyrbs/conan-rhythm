base_config: egs/conan_emformer_rhythm_v2_teacher_offline_train100_360_pause_recall_structural.yaml

# Local-successor bridge for inheriting cloud1/autodl stage-1 assets into this
# repo without mutating the currently running cloud job.
#
# Source materials preserved locally:
# - docs/cloud1_autodl_project_status_snapshot_2026-04-08.md
# - tmp_autodl_fetch/pause_split_heads_resume.yaml
#
# Rules:
# - use this as a NEW local experiment with a fresh exp_name
# - warm-start from cloud1 checkpoints with load_ckpt_strict: false
# - do not treat it as an exact optimizer-state resume of the active cloud run
#
# Critical absorption from cloud1 that is already compatible with local code:
# - split pause support/allocation heads
# - executed-surface pause-event repair
# - wider sparse top-k support coverage
# - lower repeated boundary amplification
# - slightly warmer sparse selection
#
# Intentionally omitted from the raw cloud YAML:
# - rhythm_pause_support_event_weight
# - rhythm_pause_support_count_weight
# - rhythm_pause_support_loss_type
# - rhythm_pause_support_focal_gamma
# - rhythm_pause_support_focal_alpha
# - rhythm_pause_support_pos_weight
# - rhythm_pause_event_boundary_weight
# - rhythm_projector_pause_boundary_mode
# because current local code either does not parse them yet, or already uses a
# gain-style projector boundary reweighting internally.

load_ckpt_strict: false

rhythm_pause_support_split_enable: true
rhythm_pause_breath_features_enable: true
rhythm_pause_breath_reset_threshold: 0.55

rhythm_teacher_projector_force_full_commit: true
rhythm_teacher_projector_soft_pause_selection: true

rhythm_pause_support_weight: 0.05
rhythm_pause_allocation_weight: 0.04

rhythm_pause_event_weight: 0.20
rhythm_pause_event_threshold: 0.30
rhythm_pause_event_temperature: 0.22
rhythm_pause_event_pos_weight: 2.0

rhythm_boundary_feature_scale: 0.22
rhythm_boundary_source_cue_weight: 0.55
rhythm_pause_source_boundary_weight: 0.06
rhythm_pause_boundary_weight: 0.22

rhythm_projector_pause_selection_mode: sparse
rhythm_projector_pause_topk_ratio: 0.55
rhythm_projector_pause_topk_ratio_train_start: 0.50
rhythm_projector_pause_topk_ratio_train_end: 0.55
rhythm_projector_pause_topk_ratio_anneal_steps: 15000
rhythm_projector_pause_soft_temperature: 0.20
rhythm_projector_pause_boundary_bias_weight: 0.08
rhythm_projector_pause_min_boundary_weight: 0.0
