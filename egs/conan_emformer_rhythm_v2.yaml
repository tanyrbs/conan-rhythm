base_config: egs/conan_emformer.yaml
mel_losses: "l1:1.0"

binarization_args:
  with_rhythm_cache: true

# Rhythm V2 transitional/debug profile.
# Maintained formal training entrypoints should use:
#   0) egs/conan_emformer_rhythm_v2_offline_teacher.yaml
#   1) egs/conan_emformer_rhythm_v2_schedule_only.yaml
#   2) egs/conan_emformer_rhythm_v2_teacher_student_kd.yaml
#   3) egs/conan_emformer_rhythm_v2_retimed_train.yaml
# Legacy runtime dual-mode KD is kept separately as a research-only branch.
# This config is kept for migration checks and conservative fallback runs.
rhythm_enable_v2: true
rhythm_teacher_only_stage: false
rhythm_runtime_mode: v2_clean
rhythm_minimal_style_only: true
rhythm_public_inputs: [content_units, dur_anchor_src, ref_rhythm_stats, ref_rhythm_trace]
rhythm_public_outputs: [speech_duration_exec, pause_after_exec, commit_frontier, rhythm_state_next]
rhythm_public_losses: [L_exec_speech, L_exec_pause, L_budget, L_prefix_state, L_base, L_rhythm_exec, L_stream_state, L_pitch]
content_vocab_size: 102

rhythm_stats_dim: 6
rhythm_trace_dim: 5
rhythm_trace_bins: 24
rhythm_trace_horizon: 0.35
rhythm_cache_version: 5
rhythm_slow_topk: 6
rhythm_selector_cell_size: 3
rhythm_source_phrase_threshold: 0.55
rhythm_hidden_size: 256
rhythm_max_total_logratio: 0.8
rhythm_max_unit_logratio: 0.6
rhythm_pause_share_max: 0.45
# Keep source-boundary cues as soft priors, not dominant pause-placement owners.
rhythm_boundary_feature_scale: 0.35
rhythm_boundary_source_cue_weight: 0.20
rhythm_pause_boundary_latent_weight: 0.25
rhythm_pause_source_boundary_weight: 0.10
rhythm_source_boundary_scale: 0.60
rhythm_source_boundary_scale_train_start: 1.00
rhythm_source_boundary_scale_train_end: 0.60
rhythm_source_boundary_scale_warmup_steps: 0
rhythm_source_boundary_scale_anneal_steps: 20000
rhythm_teacher_source_boundary_scale: 0.45
rhythm_separator_aware: true
rhythm_tail_open_units: 1
rhythm_apply_mode: infer
rhythm_apply_train_override: false   # keep decoder on source canvas until retimed target training is ready
rhythm_apply_valid_override: false   # validation loss stays shape-aligned with ground-truth mel
rhythm_apply_test_override: true     # streaming test/infer should exercise the real retimed execution path
rhythm_train_render_start_steps: 0
rhythm_valid_render_start_steps: 0
rhythm_force_reference_conditioning: true
rhythm_train_identity_fallback: false
rhythm_binarize_self_targets: true
rhythm_binarize_teacher_targets: true
rhythm_binarize_retimed_mel_targets: true
rhythm_binarize_retimed_mel_source: teacher
rhythm_enable_algorithmic_teacher: false
rhythm_enable_dual_mode_teacher: false
rhythm_enable_learned_offline_teacher: false
rhythm_runtime_enable_learned_offline_teacher: false
rhythm_teacher_target_source: learned_offline
rhythm_use_retimed_target_if_available: true
rhythm_retimed_target_mode: cached
rhythm_online_retimed_target_start_steps: 40000
rhythm_use_retimed_pitch_target: false
rhythm_disable_pitch_loss_when_retimed: true
rhythm_disable_mel_adv_when_retimed: true
rhythm_resample_retimed_target_to_output: true
rhythm_export_debug_sidecars: false
rhythm_export_cache_audit_to_sample: false
rhythm_retimed_target_start_steps: 0
rhythm_retimed_pause_frame_weight: 0.20
rhythm_retimed_stretch_weight_min: 0.35
# Transitional setting:
# use cached targets first, but still allow runtime fallback while refreshing caches.
# Maintained experiments should move through:
#   offline_teacher -> export learned_offline teacher assets
#   minimal_v1 -> schedule_only -> teacher_student_kd -> retimed_train
# `dual_mode_kd` remains a separate legacy research branch.
rhythm_dataset_target_mode: prefer_cache
rhythm_primary_target_surface: guidance
rhythm_distill_surface: auto
rhythm_streaming_prefix_train: false
rhythm_streaming_prefix_deterministic: true
rhythm_streaming_prefix_min_ratio: 0.50
rhythm_streaming_prefix_max_ratio: 0.90
rhythm_streaming_prefix_min_tokens: 8
rhythm_streaming_prefix_multiple: 4
# Cached rhythm targets in the current repo are self-conditioned surfaces.
# Keep rhythm conditioning self-consistent unless a pairwise offline cache is introduced later.
rhythm_cached_reference_policy: self
rhythm_dataset_build_guidance_from_ref: true
rhythm_dataset_build_teacher_from_ref: false
rhythm_guidance_rate_scale_min: 0.60
rhythm_guidance_rate_scale_max: 1.80
rhythm_guidance_local_rate_strength: 0.35
rhythm_guidance_segment_bias_strength: 0.25
rhythm_guidance_pause_strength: 1.00
rhythm_guidance_boundary_strength: 1.25
rhythm_guidance_pause_budget_ratio_cap: 0.75
rhythm_teacher_rate_scale_min: 0.55
rhythm_teacher_rate_scale_max: 1.95
rhythm_teacher_local_rate_strength: 0.45
rhythm_teacher_segment_bias_strength: 0.30
rhythm_teacher_pause_strength: 1.10
rhythm_teacher_boundary_strength: 1.50
rhythm_teacher_source_boundary_pause_weight: 0.25
rhythm_teacher_source_boundary_prior_clip: 1.50
rhythm_teacher_source_boundary_gate_floor: 0.05
rhythm_teacher_source_boundary_gate_ceiling: 0.55
rhythm_teacher_source_boundary_agreement_center: 0.15
rhythm_teacher_source_boundary_agreement_scale: 4.0
rhythm_teacher_pause_budget_ratio_cap: 0.80
rhythm_teacher_speech_smooth_kernel: 3
rhythm_teacher_pause_topk_ratio: 0.30
rhythm_teacher_phrase_final_bonus: 0.20
rhythm_teacher_confidence_bonus: 0.05
rhythm_distill_confidence_floor: 0.05
rhythm_distill_confidence_power: 1.0
rhythm_test_chunkwise: true
rhythm_test_tokens_per_chunk: 4

rhythm_projector_min_speech_frames: 1
rhythm_projector_max_speech_expand: 3.0
rhythm_projector_tail_hold_units: 2
rhythm_projector_boundary_commit_threshold: 0.45
rhythm_projector_pause_topk_ratio: 0.35
rhythm_projector_pause_topk_ratio_train_start: 1.0
rhythm_projector_pause_topk_ratio_train_end: 0.35
rhythm_projector_pause_topk_ratio_warmup_steps: 0
rhythm_projector_pause_topk_ratio_anneal_steps: 20000
rhythm_projector_pause_min_boundary_weight: 0.10
rhythm_projector_pause_boundary_bias_weight: 0.15
rhythm_projector_pause_train_soft: true
rhythm_projector_pause_soft_temperature: 0.12
rhythm_renderer_phase_init_gain: 0.10

lambda_rhythm_exec_speech: 1.0
lambda_rhythm_exec_pause: 1.0
lambda_rhythm_budget: 0.15
lambda_rhythm_cumplan: 0.15
# Keep the extra planner-proxy loss disabled in the mainline.
# Schedule supervision should come primarily from executed speech/pause,
# plus a light budget / cumulative-plan guardrail.
lambda_rhythm_plan: 0.0
rhythm_plan_local_weight: 0.5
rhythm_plan_cum_weight: 1.0
lambda_rhythm_guidance: 0.0
lambda_rhythm_distill: 0.0
rhythm_distill_budget_weight: 0.0
rhythm_distill_allocation_weight: 0.0
rhythm_distill_prefix_weight: 0.25
rhythm_compact_joint_loss: true
rhythm_joint_budget_macro_weight: 0.35
rhythm_joint_cumplan_macro_weight: 0.65
rhythm_require_retimed_cache: false
rhythm_require_cached_teacher: false
rhythm_schedule_only_stage: false
rhythm_optimize_module_only: false
rhythm_optimize_pause_state: false
rhythm_retimed_confidence_floor: 0.05
