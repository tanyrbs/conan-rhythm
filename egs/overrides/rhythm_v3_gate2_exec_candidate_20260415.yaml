base_config: egs/overrides/rhythm_v3_online_weighted_streaming.yaml

# 2026-04-15 local execution-layer candidate.
# This is intentionally not the official maintained line. It keeps the
# weighted_median + ema + first_speech contract and only widens execution headroom.
rhythm_v3_eval_mode: coarse_only
rhythm_v3_gate_quality_strict: false
rhythm_v3_required_gate_status_json: egs/overrides/rhythm_v3_gate_status_local_candidate_20260415_exec.json
rhythm_v3_require_gate2_for_official_train: false
rhythm_v3_strict_minimal_claim_profile: false
rhythm_v3_use_src_gap_in_coarse_head: true
rhythm_v3_disable_local_residual: true
rhythm_v3_disable_coarse_bias: false
lambda_rhythm_pref: 0.0
lambda_rhythm_cons: 0.0

rhythm_v3_integer_projection_mode: greedy_repair
rhythm_v3_integer_projection_anchor_mode: rounded
rhythm_v3_projection_repair_max_steps: 6
rhythm_v3_projection_repair_speech_bonus: 1.0
rhythm_v3_projection_repair_boundary_penalty: 0.35

rhythm_v3_prefix_budget_pos: 36
rhythm_v3_prefix_budget_neg: 36
rhythm_v3_budget_mode: hybrid
rhythm_v3_analytic_gap_clip: 0.50
rhythm_v3_boundary_carry_decay: 0.40
rhythm_v3_boundary_offset_decay: 0.75
