base_config: egs/conan_emformer_rhythm_v3.yaml

# Gate 0: static g audit (upper-bound exact-family probe).
# This is a diagnostic-only surface; it is not the maintained streaming-safe
# source-side online contract.
# Keep the mainline config, but hard-freeze the analysis knobs here instead of
# relying on manual comment edits in the parent YAML.
rhythm_v3_eval_mode: analytic
rhythm_v3_gate_quality_strict: false
rhythm_v3_disable_local_residual: true
rhythm_v3_disable_coarse_bias: true
rhythm_v3_src_prefix_stat_mode: exact_global_family
lambda_rhythm_bias: 0.0
lambda_rhythm_pref: 0.0
lambda_rhythm_cons: 0.0
