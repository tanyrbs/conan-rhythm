base_config: egs/overrides/rhythm_v3_online_weighted_streaming.yaml

# Gate 3: local-residual falsification on the maintained online writer.
# Re-enable the learned path only after Gate 2 has shown coarse-only is
# already stable enough to stand on its own.
rhythm_v3_eval_mode: learned
rhythm_v3_gate_quality_strict: true
rhythm_v3_required_gate_status_json: egs/overrides/rhythm_v3_gate_status.json
rhythm_v3_disable_learned_gate: false
rhythm_v3_disable_local_residual: false
rhythm_v3_disable_coarse_bias: false
rhythm_v3_detach_global_term_in_local_head: true
rhythm_v3_silence_coarse_weight: 0.0
lambda_rhythm_pref: 0.0
lambda_rhythm_cons: 0.0
