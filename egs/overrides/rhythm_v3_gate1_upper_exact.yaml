base_config: egs/experiments/local/rhythm_v3_local_weighted_exact.yaml

# Gate 1-upper: stronger offline/local validation contract used to prove
# the mixed global cue exists before the maintained online state catches up.
rhythm_v3_eval_mode: analytic
rhythm_v3_gate_quality_strict: false
rhythm_v3_disable_local_residual: true
rhythm_v3_disable_coarse_bias: true
lambda_rhythm_bias: 0.0
lambda_rhythm_pref: 0.0
lambda_rhythm_cons: 0.0
