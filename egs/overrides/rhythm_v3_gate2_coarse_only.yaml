base_config:
  - egs/overrides/rhythm_v3_online_weighted_streaming.yaml
  - egs/overrides/rhythm_v3_official_strict_gate.yaml

# Official Gate2 coarse-only surface.
# This is the canonical maintained training/eval surface, not a dated local candidate.
rhythm_v3_eval_mode: coarse_only
rhythm_v3_strict_minimal_claim_profile: true

rhythm_v3_use_src_gap_in_coarse_head: false
rhythm_v3_disable_local_residual: true
rhythm_v3_disable_coarse_bias: false

# Gate2 must optimize the execution/prefix semantics that review gates inspect.
lambda_rhythm_pref: 0.15
lambda_rhythm_cons: 0.05

# Official path keeps projector canonical.
rhythm_v3_integer_projection_mode: greedy
rhythm_v3_integer_projection_anchor_mode: rounded

rhythm_v3_prefix_budget_pos: 24
rhythm_v3_prefix_budget_neg: 24
rhythm_v3_budget_mode: total
rhythm_v3_analytic_gap_clip: 0.35
rhythm_v3_boundary_carry_decay: 0.25
rhythm_v3_boundary_offset_decay: 0.60
