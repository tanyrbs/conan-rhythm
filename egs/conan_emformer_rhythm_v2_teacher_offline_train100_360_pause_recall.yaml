base_config: egs/conan_emformer_rhythm_v2_teacher_offline.yaml

# Stage-1 pause-recall recovery overlay for the train100+train360 concatenated run.
# Use this when module-only teacher training shows:
#   - pause_event_precision >> pause_event_recall
#   - budget_projection_repair_ratio_mean ~ 0
#   - prefix_drift_l1 improves slowly because pause support is too conservative
#
# This overlay does two things together:
#   1) keeps the original pause-value regression while lightly increasing event recall pressure
#   2) widens sparse projector capacity so extra pause candidates can actually survive

# Conservative pause-recall tune.
rhythm_pause_event_weight: 0.20
rhythm_pause_event_threshold: 0.50
rhythm_pause_event_temperature: 0.20
rhythm_pause_event_pos_weight: 2.0

# Make the sparse projector explicitly recall-friendly for resumed stage-1.
rhythm_projector_pause_selection_mode: sparse
rhythm_projector_pause_topk_ratio: 0.45
rhythm_projector_pause_topk_ratio_train_start: 1.0
rhythm_projector_pause_topk_ratio_train_end: 0.45
rhythm_projector_pause_topk_ratio_anneal_steps: 60000
rhythm_projector_pause_boundary_bias_weight: 0.22
rhythm_pause_boundary_weight: 0.50
