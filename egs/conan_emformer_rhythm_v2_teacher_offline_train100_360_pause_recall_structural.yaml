base_config: egs/conan_emformer_rhythm_v2_teacher_offline_train100_360_pause_recall_next.yaml

# Structural recall repair on top of the recommended "next" overlay:
#   - split pause support vs allocation on the planner side
#   - inject cheap breath-debt / run-length features into the active teacher path
#   - keep strict checkpoint loading off because pause_allocation_head /
#     pause_feature_proj are new parameters relative to older checkpoints
load_ckpt_strict: false

rhythm_pause_support_split_enable: true
rhythm_pause_breath_features_enable: true
rhythm_pause_breath_reset_threshold: 0.55

# Light planner-head supervision: let support learn where pause is allowed,
# and let allocation learn how to distribute pause mass once support is open.
rhythm_pause_support_weight: 0.08
rhythm_pause_allocation_weight: 0.04
