base_config: egs/conan_emformer_rhythm_v2_student_kd.yaml

# Experimental stage-2 ceiling ablation:
# - keep the primary teacher surface unchanged
# - switch distillation to a different source (algorithmic runtime teacher)
# - re-enable a *small* amount of control-surface KD instead of shape-only KD
#
# This is intentionally not the maintained default. It exists so stage-2 can
# test whether a light budget/prefix distill helps the student inherit more of
# the teacher's streaming control behavior without reintroducing duplicate
# cache-vs-cache supervision.

rhythm_strict_mainline: false
rhythm_distill_surface: algorithmic
rhythm_enable_algorithmic_teacher: true

lambda_rhythm_distill: 0.35
rhythm_distill_exec_weight: 0.0
rhythm_distill_budget_weight: 0.05
rhythm_distill_prefix_weight: 0.10
rhythm_distill_allocation_weight: 0.0
rhythm_distill_speech_shape_weight: 0.25
rhythm_distill_pause_shape_weight: 0.25
