# Conservative runtime/config overrides for the short-reference + long-stream regime.
# Apply on top of egs/conan_emformer_rhythm_v2*.yaml when source streams are
# materially longer than the reference prompt.

# Expose slow-memory sidecars so the module can fall back to slow/global rhythm
# cues instead of replaying the reference tail after local phase is exhausted.
rhythm_emit_reference_sidecar: true

# Keep this disabled by default on the mainline, but explicitly enable it in the
# robustness profile for short-ref / long-stream evaluation.
rhythm_enable_trace_exhaustion_fallback: true

# Fade local trace control toward slow/global summaries only when the aligned
# local phase is genuinely being over-consumed.
rhythm_trace_exhaustion_gap_start: 0.08
rhythm_trace_exhaustion_gap_end: 0.22
rhythm_trace_exhaustion_local_floor: 0.20

# Slightly tighten the local reference window so phrase-final cues near the tail
# do not dominate too much of a longer stream.
rhythm_trace_horizon: 0.30
