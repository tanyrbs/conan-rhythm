# Conservative runtime/config overrides for the short-reference + long-stream regime.
# Apply on top of egs/conan_emformer_rhythm_v2*.yaml when source streams are materially
# longer than the reference prompt.

# Expose reference-conditioning sidecars so the module can fall back to
# global/slow/phrase priors instead of replaying the short reference tail.
# Note: this is a reference sidecar knob, not the dataset debug-sidecar knob.
rhythm_emit_reference_sidecar: true

# Keep the raw local trace untouched, but explicitly gate the local/boundary trace
# paths once the short prompt tail keeps getting reused.
rhythm_trace_reliability_enable: true
rhythm_trace_exhaustion_gap_start: 0.08
rhythm_trace_exhaustion_gap_end: 0.22
rhythm_trace_exhaustion_local_floor: 0.20
rhythm_trace_exhaustion_boundary_floor: 0.05
rhythm_trace_exhaustion_reuse_full_count: 3
rhythm_trace_exhaustion_final_cell_suppress: 0.65

# Use source anchor durations when laying the local trace window over the current
# unit sequence so long units consume more of the local progress span than short ones.
rhythm_trace_anchor_aware_sampling: true
rhythm_trace_active_tail_only: true
rhythm_trace_offset_lookahead_units: 8
rhythm_trace_cold_start_min_visible_units: 3
rhythm_trace_cold_start_full_visible_units: 8

# Optional: slightly tighten the local reference window so near-tail phrase-final cues
# do not dominate too much of the stream.
rhythm_trace_horizon: 0.30

# Prefer canonical `phase_decoupled_*` names. This overlay switches runtime
# control toward boundary-driven phrase/global priors rather than continuous
# phase-trace control.
rhythm_phase_decoupled_timing: true
rhythm_phase_decoupled_phrase_gate_boundary_threshold: 0.55
rhythm_phase_decoupled_segment_shape_scale: 0.35
rhythm_phase_decoupled_local_rho_scale: 0.20
rhythm_phase_decoupled_soft_rollover_scale: 0.10
rhythm_phase_decoupled_rollover_start: 0.68
rhythm_phase_decoupled_rollover_end: 0.92

# Light planner-side proxy losses help the open-segment shape/rollover path stay
# audible in the short-ref regime without overtaking executed speech/pause.
lambda_rhythm_plan: 0.10
rhythm_plan_local_weight: 0.50
rhythm_plan_cum_weight: 1.00
rhythm_plan_segment_shape_weight: 0.20
rhythm_plan_pause_release_weight: 0.10
