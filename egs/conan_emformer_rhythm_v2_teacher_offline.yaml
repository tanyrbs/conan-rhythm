base_config: egs/conan_emformer_rhythm_v2_minimal_v1.yaml

# Warm-start into the rhythmized model from a base Conan checkpoint is usually partial:
# the checkpoint will not contain Rhythm V2 teacher/runtime modules.
# Keep loading non-strict so overlapping backbone weights restore cleanly while new
# rhythm-specific parameters initialize from scratch.
load_ckpt_strict: false

# Formal maintained stage-1:
# - teacher-only offline/full-commit branch
# - supervision/cache truth still anchored on the cached guidance/self floor
# - stabilize first, then export learned_offline teacher surfaces for
#   student_kd / student_retimed
rhythm_stage: teacher_offline
rhythm_minimal_v1_profile: false
rhythm_strict_mainline: false
rhythm_teacher_only_stage: true
# `teacher_as_main` here means: run the learned offline teacher as the main
# execution branch for teacher-only audit/export style training. It is an
# offline/full-commit teacher runtime, not the deployment streaming runtime;
# the module rebuilds a closed teacher view and fresh teacher state per call.
rhythm_teacher_as_main: true
rhythm_schedule_only_stage: false
rhythm_optimize_module_only: true
rhythm_fastpath_disable_acoustic_when_module_only: true
rhythm_compact_joint_loss: false

rhythm_dataset_target_mode: cached_only
rhythm_primary_target_surface: guidance
rhythm_teacher_target_source: algorithmic
rhythm_distill_surface: none
rhythm_require_cached_teacher: false
rhythm_enable_dual_mode_teacher: false
rhythm_enable_learned_offline_teacher: true
rhythm_runtime_enable_learned_offline_teacher: true
# Judge in this stage:
# - teacher projector sparsity / force_full_commit
# - phrase gating / source-boundary scale
# - projector debt anti-windup
# Do not judge:
# - streaming-only scheduler residual / debt-priority knobs
rhythm_enable_algorithmic_teacher: false
# Maintained stage-1 keeps teacher supervision/cache truth on the cached
# guidance floor for stability / asset compatibility. A future research config
# can flip these knobs if you want a true "teacher learns from runtime teacher"
# ablation, but that is intentionally not the maintained default here.
rhythm_dataset_build_teacher_from_ref: false
rhythm_dataset_build_guidance_from_ref: false
rhythm_binarize_teacher_targets: false
rhythm_binarize_retimed_mel_targets: false
rhythm_binarize_retimed_mel_source: guidance
rhythm_use_retimed_target_if_available: false
rhythm_require_retimed_cache: false
rhythm_apply_train_override: false
rhythm_apply_valid_override: false
rhythm_export_debug_sidecars: false
rhythm_export_cache_audit_to_sample: false

lambda_rhythm_guidance: 0.0
lambda_rhythm_distill: 0.0
lambda_rhythm_teacher_aux: 0.0
lambda_rhythm_exec_speech: 1.0
lambda_rhythm_exec_pause: 1.0
lambda_rhythm_budget: 0.08
lambda_rhythm_cumplan: 0.12
lambda_rhythm_plan: 0.0
lambda_mel_adv: 0.0
rhythm_pause_boundary_weight: 0.35
rhythm_feasible_debt_weight: 0.05

use_pitch_embed: false
binarization_args:
  with_f0: false
