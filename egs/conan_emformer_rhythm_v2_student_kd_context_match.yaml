base_config: egs/conan_emformer_rhythm_v2_student_kd.yaml

# Experimental stage-2 branch follows the same partial warm-start rule as student_kd.
load_ckpt_strict: false

# Experimental stage-2 branch:
# prefix-truncated training + context-matched KD gate + conservative EMA balance.
rhythm_streaming_prefix_train: true
rhythm_streaming_prefix_deterministic: true
rhythm_streaming_prefix_min_ratio: 0.60
rhythm_streaming_prefix_max_ratio: 0.90
rhythm_streaming_prefix_min_tokens: 8
rhythm_streaming_prefix_multiple: 4

rhythm_enable_distill_context_match: true
rhythm_distill_context_floor: 0.35
rhythm_distill_context_power: 1.0
rhythm_distill_context_open_run_penalty: 0.50

rhythm_loss_balance_mode: ema_group
rhythm_loss_balance_beta: 0.98
rhythm_loss_balance_alpha: 0.50
rhythm_loss_balance_warmup_steps: 200
rhythm_loss_balance_min_scale: 0.50
rhythm_loss_balance_max_scale: 2.00
