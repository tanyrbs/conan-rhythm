base_config: egs/conan_emformer_rhythm_v2_teacher_offline.yaml

# Formal AutoDL train100 prep:
# - train split: LibriTTS train-clean-100
# - valid split: dev-clean
# - test split: test-clean
processed_data_dir: data/processed/libritts_train100_formal
binary_data_dir: data/binary/libritts_train100_formal_rhythm_v5

# Metadata built by scripts/build_libritts_local_processed_metadata.py now carries
# canonical explicit split labels (`train` / `valid` / `test`), so prefix rules
# are intentionally disabled for this dataset-specific preset.
valid_prefixes: []
test_prefixes: []
test_ids: []

# Unique speakers across train-clean-100 + dev-clean + test-clean.
num_spk: 326

# Recommended stage-1 warm-start for the first formal train100 GPU run.
load_ckpt: checkpoints/Conan/model_ckpt_steps_200000.ckpt
load_ckpt_strict: false
